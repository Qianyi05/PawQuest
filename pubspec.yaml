name: pawquest
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & 字体
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0

  # 音频（新版，已解决 http 冲突）
  audioplayers: ^6.5.1

  # Firebase（保持兼容的新版组合）
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

  # App 逻辑
  provider: ^6.1.5
  http: ^1.6.0
  geolocator: ^12.0.0
  flutter_dotenv: ^5.2.1
  english_words: ^4.0.0
  pedometer: ^4.1.1
  file_picker: ^8.3.7   
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  vector_math: 2.2.0



flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/images/cats_profile/
    - assets/images/cats/
    - assets/images/badges/
    - assets/images/icons/
    - assets/images/real_food/
    - assets/images/default_profile.png
    - assets/config/cities.json
    - assets/config/food_details.json
    - assets/images/food/
    - assets/images/tape.png
    - assets/images/title/
    - assets/images/steps.png
    - .env
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/app_icon.png"
  remove_alpha_ios: true

fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-Bold.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
